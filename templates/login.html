<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saarthi • 3D AI Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .logout-btn {
            color: #ff5555;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            padding: 8px 20px;
            border: 1px solid #ff5555;
            border-radius: 30px;
            transition: all 0.3s ease;
            margin-left: auto;
        }
        .logout-btn:hover {
            background: rgba(255, 85, 85, 0.15);
            color: #ff7777;
            box-shadow: 0 0 15px rgba(255, 85, 85, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="three-canvas"></canvas>

    <div class="hud-overlay">
        <!-- Header -->
        <div class="header">
            <div class="logo">SAARTHI</div>
            <div class="status">
                <span class="status-dot"></span>
                ONLINE • GEMINI + OLLAMA
            </div>
            <a href="/logout" class="logout-btn">LOGOUT</a>
        </div>

        <!-- Central Display -->
        <div class="center-panel">
            <div class="core-text" id="core-text">SAARTHI</div>
            <div id="response-text">Hello Sir, I'm ready.<br>How may I assist you today?</div>
        </div>

        <!-- Conversation Log -->
        <div class="conversation-panel">
            <div class="chat-header">◉ CONVERSATION LOG</div>
            <div id="chat-log"></div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button id="mic-btn" title="Voice Command">🎤</button>
            <input type="text" id="text-input" placeholder="Type your command here..." autocomplete="off">
            <button id="send-btn">SEND</button>
        </div>

        <div class="footer">
            3D JARVIS INTERFACE v2.0 • CONNECTED TO SAARTHI BACKEND
        </div>

        <div class="scan-line"></div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
