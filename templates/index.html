<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saarthi • 3D AI Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <canvas id="three-canvas"></canvas>

    <div class="hud-overlay">
        <!-- Header -->
        <div class="header">
            <div class="logo">SAARTHI</div>
            <div class="status">
                <span class="status-dot"></span>
                ONLINE • GEMINI + OLLAMA
            </div>
        </div>

        <!-- Central Display -->
        <div class="center-panel">
            <div class="core-text" id="core-text">SAARTHI</div>
            <div id="response-text">Hello Sir, I'm ready.</div>
        </div>

        <!-- Conversation Log -->
        <div class="conversation-panel">
            <div class="chat-header">◉ CONVERSATION LOG</div>
            <div id="chat-log"></div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button id="mic-btn" title="Click to speak">🎤</button>
            <input type="text" id="text-input" placeholder="Type your command here..." autocomplete="off">
            <button id="send-btn">SEND</button>
        </div>

        <div class="footer">
            3D JARVIS INTERFACE • CONNECTED TO SAARTHI BACKEND
        </div>

        <div class="scan-line"></div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
