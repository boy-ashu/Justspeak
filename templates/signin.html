<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saarthi • Sign In</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { 
            margin:0; 
            height:100vh; 
            background:#0a0a1f; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            font-family:'Orbitron', sans-serif; 
        }
        .auth-box { 
            background:rgba(10,10,31,0.95); 
            border:3px solid #00f7ff; 
            border-radius:25px; 
            padding:50px 60px; 
            width:440px; 
            text-align:center; 
            box-shadow:0 0 70px rgba(0,247,255,0.5); 
        }
        .logo { 
            font-size:48px; 
            font-weight:700; 
            letter-spacing:8px; 
            text-shadow:0 0 30px #00ffea; 
            margin-bottom:10px; 
        }
        input { 
            width:100%; 
            padding:16px 20px; 
            margin:12px 0; 
            background:rgba(255,255,255,0.08); 
            border:2px solid #00f7ff; 
            border-radius:50px; 
            color:white; 
            font-size:16px; 
        }
        button { 
            width:100%; 
            padding:16px; 
            margin-top:20px; 
            background:#00f7ff; 
            color:#0a0a1f; 
            border:none; 
            border-radius:50px; 
            font-weight:700; 
            cursor:pointer; 
            font-size:17px;
        }
        .error { 
            color:#ff6666; 
            margin:15px 0; 
            font-size:15px;
        }
        .link { 
            margin-top:25px; 
            color:#00ffea; 
            text-decoration:none; 
        }
        .link:hover { color:#00f7ff; }
    </style>
</head>
<body>
    <div class="auth-box">
        <div class="logo">SAARTHI</div>
        <h2>Sign In</h2>
        
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST" action="{{ url_for('signin') }}">
            <input type="text" 
                   name="username" 
                   placeholder="Username" 
                   value="{{ request.form.username or '' }}" 
                   required autofocus>

            <input type="password" 
                   name="password" 
                   placeholder="Password" 
                   required>

            <button type="submit">SIGN IN</button>
        </form>

        <a href="{{ url_for('signup') }}" class="link">Don't have an account? Sign Up</a>
    </div>
</body>
</html>
