<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enable 2FA - Saarthi AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .qr-container { background: #f8f9fa; padding: 20px; border-radius: 12px; }
        .secret-box { font-family: monospace; background: #000; color: #0f0; padding: 12px; border-radius: 8px; }
    </style>
</head>
<body class="bg-dark text-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card bg-secondary text-light shadow">
                    <div class="card-header text-center">
                        <h3>🔐 Enable Two-Factor Authentication</h3>
                    </div>
                    <div class="card-body">
                        <p class="text-center">Scan this QR code with your authenticator app (Google Authenticator, Microsoft Authenticator, etc.)</p>

                        <div class="text-center qr-container mb-4">
                            <img src="data:image/png;base64,{{ qr }}" alt="2FA QR Code" class="img-fluid" style="max-width: 220px;">
                        </div>

                        <div class="mb-4">
                            <p class="mb-1"><strong>Or enter this secret manually:</strong></p>
                            <div class="secret-box text-center fs-5">{{ secret }}</div>
                        </div>

                        {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                        {% endif %}

                        <form method="POST" action="{{ url_for('verify_2fa_setup') }}">
                            <div class="mb-3">
                                <label class="form-label">Enter the 6-digit code from your authenticator app</label>
                                <input type="text" 
                                       name="otp" 
                                       class="form-control form-control-lg text-center" 
                                       maxlength="6" 
                                       inputmode="numeric" 
                                       pattern="\d{6}" 
                                       autocomplete="one-time-code" 
                                       required autofocus>
                            </div>

                            <!-- Pass secret and qr back in case of error -->
                            <input type="hidden" name="secret" value="{{ secret }}">
                            <input type="hidden" name="qr" value="{{ qr }}">

                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-lg">Verify & Enable 2FA</button>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <a href="{{ url_for('index') }}" class="text-muted">Cancel</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
