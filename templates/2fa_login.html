<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Verification - Saarthi AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card bg-secondary text-light shadow">
                    <div class="card-header text-center">
                        <h4>🔐 Two-Factor Authentication</h4>
                    </div>
                    <div class="card-body">
                        <p class="text-center">Enter the 6-digit code from your authenticator app</p>

                        {% if error %}
                        <div class="alert alert-danger text-center">{{ error }}</div>
                        {% endif %}

                        <form method="POST">
                            <div class="mb-4">
                                <input type="text" 
                                       name="otp" 
                                       class="form-control form-control-lg text-center fs-3" 
                                       maxlength="6" 
                                       inputmode="numeric" 
                                       pattern="\d{6}" 
                                       autocomplete="one-time-code" 
                                       required autofocus>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Verify</button>
                            </div>
                        </form>

                        <div class="text-center mt-4 small text-muted">
                            <p>Don't have access to your app?<br>
                            You can use one of your <a href="#" onclick="alert('Use any of your backup codes (10 characters each). Each code can be used only once.');">backup codes</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
