<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Verification - Saarthi AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .otp-input {
            letter-spacing: 0.5em;
            font-family: monospace;
        }
        .card {
            border: 1px solid rgba(0, 247, 255, 0.3);
        }
    </style>
</head>
<body class="bg-dark text-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card bg-secondary text-light shadow">
                    <div class="card-header text-center">
                        <h4>🔐 Two-Factor Authentication</h4>
                    </div>
                    <div class="card-body">

                        {% if error %}
                        <div class="alert alert-danger text-center">{{ error }}</div>
                        {% endif %}

                        <!-- ── Normal OTP Form ── -->
                        <div id="otp-section">
                            <p class="text-center text-muted small">
                                Enter the 6-digit code from your authenticator app
                            </p>
                            <form method="POST" action="{{ url_for('twofa_login') }}" id="otp-form">
                                <input type="hidden" name="use_backup" value="0">
                                <div class="mb-4">
                                    <input type="text"
                                           name="otp"
                                           id="otp-field"
                                           class="form-control form-control-lg text-center fs-3 otp-input"
                                           maxlength="6"
                                           inputmode="numeric"
                                           pattern="\d{6}"
                                           placeholder="000000"
                                           autocomplete="one-time-code"
                                           required autofocus>
                                    <div class="invalid-feedback text-center">
                                        Please enter a 6-digit code.
                                    </div>
                                </div>
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg">
                                        Verify Code
                                    </button>
                                </div>
                            </form>
                        </div>

                        <!-- ── Backup Code Form (hidden by default) ── -->
                        <div id="backup-section" style="display:none;">
                            <p class="text-center text-muted small">
                                Enter one of your 8-character backup codes
                            </p>
                            <form method="POST" action="{{ url_for('twofa_login') }}" id="backup-form">
                                <input type="hidden" name="use_backup" value="1">
                                <div class="mb-4">
                                    <input type="text"
                                           name="otp"
                                           id="backup-field"
                                           class="form-control form-control-lg text-center otp-input"
                                           maxlength="8"
                                           placeholder="e.g. a1b2c3d4"
                                           autocomplete="off"
                                           required>
                                </div>
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-warning btn-lg">
                                        Use Backup Code
                                    </button>
                                </div>
                            </form>
                        </div>

                        <!-- ── Toggle Link ── -->
                        <div class="text-center mt-4 small">
                            <a href="#"
                               id="toggle-backup"
                               class="text-info text-decoration-none"
                               onclick="toggleBackup(event)">
                                No access to app? Use a backup code
                            </a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ── Auto-submit when 6 digits are typed ──
        document.getElementById('otp-field').addEventListener('input', function () {
            // Strip any non-digit characters the user might paste
            this.value = this.value.replace(/\D/g, '');
            if (this.value.length === 6) {
                document.getElementById('otp-form').submit();
            }
        });

        // ── Toggle between OTP and backup code sections ──
        function toggleBackup(e) {
            e.preventDefault();
            const otpSection    = document.getElementById('otp-section');
            const backupSection = document.getElementById('backup-section');
            const toggleLink    = document.getElementById('toggle-backup');

            const showingBackup = backupSection.style.display !== 'none';
            otpSection.style.display    = showingBackup ? 'block' : 'none';
            backupSection.style.display = showingBackup ? 'none'  : 'block';
            toggleLink.textContent      = showingBackup
                ? 'No access to app? Use a backup code'
                : '← Back to authenticator code';

            if (!showingBackup) {
                document.getElementById('backup-field').focus();
            } else {
                document.getElementById('otp-field').focus();
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
